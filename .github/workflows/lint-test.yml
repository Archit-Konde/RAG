name: Lint & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

      - name: Lint — critical errors
        run: flake8 src/ tests/ app.py --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint — style warnings
        run: flake8 src/ tests/ app.py --count --max-line-length=120 --statistics --exit-zero

      - name: Run tests
        run: pytest tests/ -v --ignore=tests/test_embeddings.py --ignore=tests/test_reranker.py

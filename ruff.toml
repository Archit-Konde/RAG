# Ruff configuration — RAGOps project
# https://docs.astral.sh/ruff/configuration/

line-length = 120
target-version = "py311"

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "RUF",    # ruff-specific rules
]
ignore = [
    "E501",   # line too long — handled by formatter
    "SIM108", # ternary operator — not always clearer
    "UP007",  # use X | Y for union types — needs py310+
    "RUF002", # ambiguous unicode in docstrings — en dashes are intentional
]

[lint.per-file-ignores]
"scripts/*" = ["E402"]   # sys.path manipulation before imports
"learn/*" = ["E402", "B", "N", "UP", "SIM", "TCH"]  # learning scripts are intentionally simple

[lint.isort]
known-first-party = ["src"]

[format]
quote-style = "double"
indent-style = "space"
